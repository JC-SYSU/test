# 规则名称：PCDN_Merged_Full
# 整合来源：
# 1. https://github.com/uselibrary/PCDN (主攻国内 PCDN 厂商)
# 2. https://github.com/DDCHlsq/sing-ruleset (主攻视频平台与通用 P2P)
# 格式：Mihomo Classical Payload

